# LiteLLM Proxy config - DB-less setup using model_list
# Azure OpenAI (azure provider) - gpt-4.1

model_list:
  - model_name: gpt-4.1
    litellm_params:
      model: azure/gpt-4.1
      api_base: os.environ/AZURE_OPENAI_API_BASE
      api_key: os.environ/AZURE_OPENAI_API_KEY
      api_version: os.environ/AZURE_OPENAI_API_VERSION
  # Azure AI Foundry (azure_ai provider) - gpt-oss-120b
  - model_name: gpt-oss-120b
    litellm_params:
      model: azure_ai/gpt-oss-120b
      api_base: os.environ/AZURE_FOUNDRY_API_BASE
      project: os.environ/AZURE_FOUNDRY_PROJECT
      api_key: os.environ/AZURE_FOUNDRY_API_KEY
      api_version: os.environ/AZURE_FOUNDRY_API_VERSION

# Prevent clients from overriding sensitive provider fields at request-time
litellm_settings:
  drop_params: true

# General proxy settings (no custom_auth)
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  store_model_in_db: false # DB-less PoC; avoid persisting model metadata/state
  disable_spend_logs: true # No budgets/key tracking in PoC; suppress spend logging noise
  disable_spend_updates: true # Prevent spend counters since MASTER_KEY-only and no DB/Admin UI
  disable_reset_budget: true # Budgets not enabled; disallow resets to avoid confusion

  ## TODO: We need to check those since when they are enabled they break auth
